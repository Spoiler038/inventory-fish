<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <meta name="theme-color" content="#2c3e50">
  <link rel="manifest" href="manifest.json">
  <title>Инвентаризация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
  <style>
    /* Стили из вашего index.html — скопируйте их сюда полностью */
    :root {
      --primary-color: #e74c3c;
      --secondary-color: #2c3e50;
      --accent-color: #3498db;
      --success-color: #2ecc71;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--secondary-color) 0%, #1a252f 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      background-color: #f5f7fa;
      position: relative;
      overflow: hidden;
    }
    .app-header {
      background-color: var(--secondary-color);
      color: white;
      padding: 16px 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
    }
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .app-title {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logout-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .back-btn {
      background: transparent;
      border: none;
      color: white;
      font-size: 24px;
      margin-right: 12px;
      cursor: pointer;
    }
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      position: relative;
    }
    .step { display: none; animation: fadeIn 0.3s ease; }
    .step.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: none;
      overflow: hidden;
    }
    .card-body { padding: 24px; }
    .department-card {
      cursor: pointer;
      background: white;
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 15px;
      transition: all 0.2s;
    }
    .department-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .department-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .department-icon i { font-size: 32px; }
    .department-info h5 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .department-info p { color: #777; font-size: 14px; margin: 0; }
    .products-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .product-card {
      background-color: white;
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #f0f0f0;
    }
    .product-card.chef-mode { border-left: 4px solid #f39c12; }
    .product-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .product-name {
      font-size: 16px;
      font-weight: 500;
      color: var(--secondary-color);
    }
    .product-stock {
      font-size: 17px;
      font-weight: 600;
      color: var(--secondary-color);
      white-space: nowrap;
    }
    .search-container {
      padding: 12px;
      background-color: transparent;
      flex-shrink: 0;
      display: none;
      justify-content: flex-start;
    }
    .search-container.visible { display: flex !important; }
    .search-container.collapsed .search-input,
    .search-container.collapsed .clear-search { display: none; }
    .search-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
    .search-input {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 30px;
      font-size: 16px;
      margin-left: 10px;
      display: none;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 12px;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background-color: white;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-header {
      background-color: var(--secondary-color);
      color: white;
      padding: 18px 20px;
      border-radius: 20px 20px 0 0;
    }
    .modal-body { padding: 20px; }
    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }
    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    .notification {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      background-color: var(--success-color);
      color: white;
      padding: 16px 20px;
      border-radius: 14px;
      z-index: 10000;
      text-align: center;
      max-width: 400px;
      margin: 0 auto;
    }
    .btn {
      padding: 16px;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .btn-primary { background-color: var(--accent-color); color: white; border: none; }
    .btn-success { background-color: var(--success-color); color: white; border: none; }
    .edit-icon { color: var(--accent-color); font-size: 14px; cursor: pointer; margin-left: 8px; }
    .quick-input { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
    .quick-btn { padding: 12px; background-color: #f0f2f5; border: none; border-radius: 12px; cursor: pointer; }
    .units-container { display: flex; gap: 4px; }
    .unit-btn { padding: 12px 8px; border: 2px solid #e0e0e0; border-radius: 12px; cursor: pointer; min-width: 50px; }
    .unit-btn.active { background-color: var(--accent-color); color: white; }
    .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
    @media (max-width: 480px) { .department-icon i { font-size: 26px; } }
    .product-name-container { display: flex; align-items: center; gap: 8px; flex: 1; }
    .readonly-notice { background: #f39c12; color: white; padding: 12px; border-radius: 12px; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <div style="display: flex; align-items: center;">
        <button class="back-btn" id="backButton" style="display: none;">←</button>
        <div class="app-title"><i class="bi bi-clipboard-data"></i><span id="headerTitle">Инвентаризация</span></div>
      </div>
      <div class="header-actions" id="headerActions" style="display: none;">
        <button class="logout-btn" id="logoutBtn"><i class="bi bi-box-arrow-right"></i><span>Выйти</span></button>
      </div>
    </div>
  </header>
  <main class="main-content" id="mainContent">
    <div id="step1" class="step active">
      <div class="card"><div class="card-body">
        <div class="text-center mb-4"><h2>Вход в систему</h2><p class="text-muted">Введите номер телефона</p></div>
        <form id="authForm">
          <div class="mb-4">
            <input type="tel" class="form-control form-control-lg" id="phone" placeholder="8 (999) 123-45-67" required>
          </div>
          <div class="d-grid"><button type="submit" class="btn btn-primary btn-lg">Войти</button></div>
        </form>
      </div></div>
    </div>
    <div id="step2" class="step"><div class="card"><div class="card-body">
      <div class="text-center mb-4"><h3>Выберите цех</h3><p id="userWelcome" class="text-muted"></p></div>
      <div id="departmentsList"></div>
    </div></div></div>
    <div id="step3" class="step"></div>
  </main>
  <div class="search-container collapsed" id="searchContainer">
    <div class="search-wrapper">
      <i class="bi bi-search search-icon"></i>
      <input type="text" class="search-input" id="searchInput" placeholder="Поиск продукта...">
      <button class="clear-search" id="clearSearchBtn" style="display:none;">✖</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="productModal"><div class="modal-content">
  <div class="modal-header"><div class="modal-title" id="modalProductName"></div></div>
  <div class="modal-body">
    <div class="current-stock d-flex justify-content-between mb-3"><span>Текущий остаток:</span><span id="currentStockValue"></span></div>
    <div class="quick-input">
      <button class="quick-btn" data-value="0.1">+0.1</button><button class="quick-btn" data-value="0.5">+0.5</button>
      <button class="quick-btn" data-value="1">+1</button><button class="quick-btn" data-value="5">+5</button>
    </div>
    <div class="mb-3"><label class="form-label">Количество</label><div class="input-row d-flex gap-2">
      <input type="number" step="0.001" class="form-control" id="quantityInput">
      <div class="units-container" id="unitsContainer"></div>
    </div></div>
    <div class="modal-actions">
      <button class="btn btn-warning" id="replaceBtn">Заменить</button>
      <button class="btn btn-success" id="addBtn">Добавить</button>
    </div>
  </div>
</div></div>
<script>
// GAS API URL - ЗАМЕНИТЕ НА ВАШ
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzu9U9TufKix-M5ZgjNhbnjiEkBzPw_-lA9VPpHB3hsKzBCCa4D7uWlrXhAIBC_i13D/exec';

// Функция вызова API
async function callGAS(action, params = {}) {
  const url = new URL(GAS_URL);
  url.searchParams.append('action', action);
  Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
  
  const response = await fetch(url.toString(), { method: 'GET' });
  return await response.json();
}

// Остальной JavaScript скопируйте из вашего JavaScript.gs, но ЗАМЕНИТЕ все google.script.run на вызовы callGAS()
// Например:
// google.script.run.withSuccessHandler(...).authorizeUser(phone, deviceId)
// заменяем на:
// const result = await callGAS('authorize', { phone, deviceId });
// handleAuthSuccess(result);

// Полный код адаптации - создайте отдельный файл app.js (следующий шаг)
</script>
</body>
</html>
