<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
  <meta name="theme-color" content="#2c3e50">
  <link rel="manifest" href="manifest.json">
  <title>Инвентаризация продуктов</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --primary-color: #e74c3c;
      --secondary-color: #2c3e50;
      --accent-color: #3498db;
      --success-color: #2ecc71;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--secondary-color) 0%, #1a252f 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      background-color: #f5f7fa;
      position: relative;
      overflow: hidden;
    }
    .app-header {
      background-color: var(--secondary-color);
      color: white;
      padding: 16px 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      flex-shrink: 0;
    }
    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .app-title {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logout-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .back-btn {
      background: transparent;
      border: none;
      color: white;
      font-size: 24px;
      margin-right: 12px;
      cursor: pointer;
    }
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      position: relative;
    }
    .step { display: none; animation: fadeIn 0.3s ease; }
    .step.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: none;
      overflow: hidden;
    }
    .card-body { padding: 24px; }
    .department-card {
      cursor: pointer;
      background: white;
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 15px;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .department-card:hover { transform: translateY(-2px); border-color: var(--accent-color); box-shadow: var(--shadow); }
    .department-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .department-icon i { font-size: 32px; }
    .department-info h5 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .department-info p { color: #777; font-size: 14px; margin: 0; }
    .products-list { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
    .product-card {
      background-color: white;
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid #f0f0f0;
    }
    .product-card.chef-mode { border-left: 4px solid #f39c12; }
    .product-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .product-name { font-size: 16px; font-weight: 500; color: var(--secondary-color); }
    .product-stock { font-size: 17px; font-weight: 600; color: var(--secondary-color); white-space: nowrap; }
    .product-unit { font-size: 13px; font-weight: 400; color: #777; margin-left: 2px; }
    .search-container {
      padding: 12px;
      background-color: transparent;
      flex-shrink: 0;
      display: none;
      justify-content: flex-start;
    }
    .search-container.visible { display: flex !important; }
    .search-container.collapsed .search-input,
    .search-container.collapsed .clear-search { display: none; }
    .search-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
    }
    .search-input {
      flex: 1;
      padding: 14px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 30px;
      font-size: 16px;
      margin-left: 10px;
      display: none;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 12px;
    }
    .modal-overlay.active { display: flex; }
    .modal-content {
      background-color: white;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-header {
      background-color: var(--secondary-color);
      color: white;
      padding: 18px 20px;
      border-radius: 20px 20px 0 0;
    }
    .modal-body { padding: 20px; }
    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }
    @keyframes spin {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
    .notification {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      background-color: var(--success-color);
      color: white;
      padding: 16px 20px;
      border-radius: 14px;
      z-index: 10000;
      text-align: center;
      max-width: 400px;
      margin: 0 auto;
      animation: slideDown 0.3s ease-out;
    }
    .notification.error { background-color: #e74c3c; }
    .notification.info { background-color: #3498db; }
    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .btn {
      padding: 16px;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      border: none;
    }
    .btn-primary { background-color: var(--accent-color); color: white; }
    .btn-success { background-color: var(--success-color); color: white; }
    .btn-danger { background-color: #e74c3c; color: white; }
    .btn-secondary { background-color: #6c757d; color: white; }
    .edit-icon { color: var(--accent-color); font-size: 14px; cursor: pointer; margin-left: 8px; }
    .quick-input { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
    .quick-btn { padding: 12px; background-color: #f0f2f5; border: none; border-radius: 12px; cursor: pointer; }
    .units-container { display: flex; gap: 4px; }
    .unit-btn { padding: 12px 8px; border: 2px solid #e0e0e0; border-radius: 12px; cursor: pointer; min-width: 50px; }
    .unit-btn.active { background-color: var(--accent-color); color: white; }
    .modal-actions { display: flex; gap: 10px; margin-top: 15px; }
    .product-name-container { display: flex; align-items: center; gap: 8px; flex: 1; }
    .readonly-notice { background: #f39c12; color: white; padding: 12px; border-radius: 12px; text-align: center; margin-top: 20px; }
    .current-stock { display: flex; justify-content: space-between; margin-bottom: 20px; background: #f8f9fa; padding: 12px; border-radius: 12px; }
    .quantity-input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 18px; text-align: center; }
    .form-label { font-weight: 600; margin-bottom: 8px; display: block; }
    .input-row { display: flex; gap: 8px; align-items: center; }
    @media (max-width: 480px) { .department-icon i { font-size: 26px; } }
  </style>
</head>
<body>
<div class="app-container">
  <header class="app-header">
    <div class="header-content">
      <div style="display: flex; align-items: center;">
        <button class="back-btn" id="backButton" style="display: none;">←</button>
        <div class="app-title"><i class="bi bi-clipboard-data"></i><span id="headerTitle">Инвентаризация</span></div>
      </div>
      <div class="header-actions" id="headerActions" style="display: none;">
        <button class="logout-btn" id="logoutBtn"><i class="bi bi-box-arrow-right"></i><span>Выйти</span></button>
      </div>
    </div>
  </header>
  <main class="main-content" id="mainContent">
        <div id="step1" class="step active">
      <div class="card"><div class="card-body">
        <div class="text-center mb-4">
          <img src="https://mealtime.group/logo_ryba.svg" alt="Ресторан" style="width: 100px; height: 100px; margin: 0 auto 15px auto; display: block;">
          <h2>Вход в систему</h2>
          <p class="text-muted">Введите номер телефона</p>
        </div>
        <form id="authForm">
          <div class="mb-4">
            <input type="tel" class="form-control form-control-lg" id="phone" placeholder="8 (999) 123-45-67" required>
          </div>
          <div class="d-grid"><button type="submit" class="btn btn-primary btn-lg">Войти</button></div>
        </form>
      </div></div>
    </div>
    <div id="step2" class="step"><div class="card"><div class="card-body">
      <div class="text-center mb-4"><h3>Выберите цех</h3><p id="userWelcome" class="text-muted"></p></div>
      <div id="departmentsList"></div>
    </div></div></div>
    <div id="step3" class="step"></div>
  </main>
  <div class="search-container collapsed" id="searchContainer">
    <div class="search-wrapper">
      <i class="bi bi-search search-icon"></i>
      <input type="text" class="search-input" id="searchInput" placeholder="Поиск продукта...">
      <button class="clear-search" id="clearSearchBtn" style="display:none;">✖</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="productModal"><div class="modal-content">
  <div class="modal-header"><div class="modal-title" id="modalProductName"></div></div>
  <div class="modal-body">
    <div class="current-stock"><span>Текущий остаток:</span><span id="currentStockValue"></span></div>
    <div class="quick-input">
      <button class="quick-btn" data-value="0.1">+0.1</button><button class="quick-btn" data-value="0.5">+0.5</button>
      <button class="quick-btn" data-value="1">+1</button><button class="quick-btn" data-value="5">+5</button>
    </div>
    <div><label class="form-label">Количество</label><div class="input-row">
      <input type="number" step="0.001" class="quantity-input" id="quantityInput" placeholder="0">
      <div class="units-container" id="unitsContainer"></div>
    </div></div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="replaceBtn">Заменить</button>
      <button class="btn btn-success" id="addBtn">Добавить</button>
    </div>
  </div>
</div></div>

<div class="modal-overlay" id="logoutModal"><div class="modal-content">
  <div class="modal-header"><h5 class="modal-title"><i class="bi bi-box-arrow-right me-2"></i>Подтверждение выхода</h5></div>
  <div class="modal-body">
    <div class="text-center mb-4"><i class="bi bi-question-circle" style="font-size: 3rem; color: #3498db;"></i></div>
    <h5 class="mb-3 text-center">Вы уверены, что хотите выйти?</h5>
    <div class="mt-4"><div class="form-check">
      <input class="form-check-input" type="checkbox" id="allowOtherDevices">
      <label class="form-check-label" for="allowOtherDevices">Разрешить вход на других устройствах</label>
    </div></div>
  </div>
  <div class="modal-actions p-3">
    <button class="btn btn-secondary" onclick="closeLogoutModal()">Отмена</button>
    <button class="btn btn-danger" onclick="performLogout()">Выйти</button>
  </div>
</div></div>

<script>
// ==================== КОНФИГУРАЦИЯ ====================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxbelvxTTddMcLaiLOakH2Gj_hIQ-4IEOBpuAGR8bt0iuG5EhVqNO_eRQ_v32vQ6-Vy/exec';
const TECHNICAL_SHEETS = ['Users', 'Devices', 'Logs', 'Лист1', 'Лист2'];
const units = [{ value: 'кг', name: 'килограммы' }, { value: 'шт', name: 'штуки' }, { value: 'короб', name: 'коробки' }];

// Глобальные переменные
let currentStep = 1, userData = null, currentDepartment = null, products = [], filteredProducts = [];
let selectedProduct = null, deviceId = null, currentPhone = null, isChef = false, isInventoryActive = false;
window.currentEditingProductId = null;
window.isEditingName = false;

// ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
function getDeviceId() {
  let storedId = localStorage.getItem('device_id');
  if (!storedId) {
    const navigatorInfo = navigator.userAgent + navigator.platform + navigator.language;
    const timeStamp = new Date().getTime();
    const random = Math.random().toString(36).substring(2, 15);
    let hash = 0;
    for (let i = 0; i < navigatorInfo.length; i++) {
      const char = navigatorInfo.charCodeAt(i);
      hash = ((hash << 5) - hash) + char;
      hash = hash & hash;
    }
    storedId = `device_${Math.abs(hash)}_${timeStamp}_${random.substring(0, 8)}`;
    localStorage.setItem('device_id', storedId);
  }
  deviceId = storedId;
  return storedId;
}

function showLoader() {
  hideLoader();
  const loader = document.createElement('div');
  loader.className = 'loader';
  loader.id = 'globalLoader';
  document.body.appendChild(loader);
}

function hideLoader() {
  const loader = document.getElementById('globalLoader');
  if (loader) loader.remove();
}

function showNotification(message, type = 'success') {
  const notification = document.createElement('div');
  notification.className = `notification ${type}`;
  notification.textContent = message;
  document.body.appendChild(notification);
  setTimeout(() => {
    notification.style.opacity = '0';
    setTimeout(() => notification.remove(), 300);
  }, 3000);
}

// ==================== API ВЫЗОВЫ ЧЕРЕЗ JSONP ====================
function callGAS(action, params = {}) {
  return new Promise((resolve, reject) => {
    const callbackName = `jsonp_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`;
    
    const url = new URL(GAS_URL);
    url.searchParams.append('action', action);
    url.searchParams.append('callback', callbackName);
    Object.keys(params).forEach(key => {
      if (params[key] !== undefined && params[key] !== null) {
        url.searchParams.append(key, params[key].toString());
      }
    });
    
    console.log(`Calling GAS via JSONP: ${action}`, params);
    
    const timeout = setTimeout(() => {
      if (window[callbackName]) {
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
        reject(new Error(`Timeout for ${action}`));
      }
    }, 30000);
    
    window[callbackName] = function(data) {
      clearTimeout(timeout);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      console.log(`GAS response for ${action}:`, data);
      resolve(data);
    };
    
    const script = document.createElement('script');
    script.src = url.toString();
    script.onerror = function() {
      clearTimeout(timeout);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error(`JSONP request failed for ${action}`));
    };
    document.body.appendChild(script);
  });
}

// ==================== АВТОРИЗАЦИЯ ====================
async function checkSession() {
  const result = await callGAS('checkSession', { deviceId: getDeviceId() });
  if (result.success && result.phone) {
    currentPhone = result.phone;
    document.getElementById('phone').value = result.phone;
    document.getElementById('headerActions').style.display = 'block';
    await autoAuthorize(result.phone);
  } else {
    document.getElementById('headerActions').style.display = 'none';
  }
}

async function autoAuthorize(phone) {
  showLoader();
  const result = await callGAS('authorize', { phone, deviceId: getDeviceId() });
  hideLoader();
  if (!result.error) handleAuthSuccess(result);
}

async function handleAuthSubmit(e) {
  e.preventDefault();
  const phoneInput = document.getElementById('phone').value;
  const cleanPhone = phoneInput.replace(/\D/g, '');
  if (cleanPhone.length < 10) {
    showNotification('Введите корректный номер телефона', 'error');
    return;
  }
  const normalizedPhone = cleanPhone.slice(-10);
  localStorage.setItem('last_phone', normalizedPhone);
  currentPhone = normalizedPhone;
  
  showLoader();
  const result = await callGAS('authorize', { phone: cleanPhone, deviceId: getDeviceId() });
  hideLoader();
  
  if (result.error) {
    showNotification(result.error, 'error');
    return;
  }
  handleAuthSuccess(result);
}

function handleAuthSuccess(result) {
  userData = result;
  isChef = result.isChef || false;
  isInventoryActive = result.inventoryActive || false;
  
  callGAS('saveSession', { phone: currentPhone, deviceId: getDeviceId() });
  
  document.getElementById('headerActions').style.display = 'block';
  document.getElementById('userWelcome').textContent = `Добро пожаловать, ${result.user.name || 'Пользователь'}!`;
  
  const filteredDepartments = result.departments.filter(dept => !TECHNICAL_SHEETS.includes(dept));
  
  if (filteredDepartments.length === 0) {
    showNotification('Нет доступных цехов', 'error');
    return;
  }
  
  if (filteredDepartments.length > 1) {
    document.getElementById('headerTitle').textContent = 'Выбор цеха';
    document.getElementById('backButton').style.display = 'none';
    renderDepartments(filteredDepartments);
    goToStep(2);
  } else {
    selectDepartment(filteredDepartments[0]);
  }
}

function renderDepartments(departments) {
  const container = document.getElementById('departmentsList');
  container.innerHTML = '';
  
  departments.forEach(dept => {
    let icon = 'bi-building';
    const d = dept.toLowerCase();
    if (d.includes('холодн')) icon = 'bi-snow2';
    else if (d.includes('горяч')) icon = 'bi-fire';
    else if (d.includes('склад')) icon = 'bi-box-seam';
    else if (d.includes('ролл')) icon = 'bi-egg-fried';
    
    const card = document.createElement('div');
    card.className = 'department-card';
    card.onclick = () => selectDepartment(dept);
    card.innerHTML = `
      <div class="department-icon"><i class="bi ${icon}"></i></div>
      <div class="department-info"><h5>${dept}</h5><p>Нажмите для входа</p></div>
      <i class="bi bi-chevron-right ms-auto" style="color: #ccc; font-size: 20px;"></i>
    `;
    container.appendChild(card);
  });
  
  if (isChef) {
    const btn = document.createElement('div');
    btn.className = 'mt-4 d-grid';
    btn.innerHTML = `
      <button class="btn ${isInventoryActive ? 'btn-danger' : 'btn-success'} btn-lg" onclick="toggleInventory()">
        <i class="bi ${isInventoryActive ? 'bi-stop-circle' : 'bi-play-circle'}"></i> 
        ${isInventoryActive ? 'Закончить инвентаризацию' : 'Начать инвентаризацию'}
      </button>
    `;
    container.appendChild(btn);
  }
}

async function toggleInventory() {
  showLoader();
  const result = await callGAS('toggleInventory', { newStatus: !isInventoryActive });
  hideLoader();
  if (result.success) {
    isInventoryActive = result.inventoryActive;
    showNotification(result.message, 'success');
    renderProducts();
  } else {
    showNotification(result.error || 'Ошибка', 'error');
  }
}

async function selectDepartment(department) {
  currentDepartment = department;
  document.getElementById('headerTitle').textContent = department;
  document.getElementById('backButton').style.display = userData?.hasMultipleDepts ? 'block' : 'none';
  
  showLoader();
  const result = await callGAS('getProducts', { department });
  hideLoader();
  
  if (result.error) {
    showNotification(result.error, 'error');
    return;
  }
  
  products = result.products || [];
  filteredProducts = [...products];
  renderProducts();
  goToStep(3);
  
  const sc = document.getElementById('searchContainer');
  if (sc) { sc.classList.add('visible', 'collapsed'); }
}

function renderProducts() {
  const container = document.getElementById('step3');
  if (!container) return;
  
  if (filteredProducts.length === 0) {
    container.innerHTML = `<div class="empty-state text-center p-5"><i class="bi bi-box" style="font-size:50px;color:#ddd;"></i><h3>Нет продуктов</h3></div>`;
    return;
  }
  
  let html = '<div class="products-list">';
  filteredProducts.forEach(product => {
    const stockDisplay = product.stock > 0 ? product.stock : '0';
    const editIcon = isChef ? `<span class="edit-icon" onclick="event.stopPropagation(); startEditName(${product.id}, '${product.name.replace(/'/g, "\\'")}', event)"><i class="bi bi-pencil"></i></span>` : '';
    const canOpen = isChef || isInventoryActive;
    const clickAttr = (!window.isEditingName && canOpen) ? `onclick="openProductModal(${product.id})"` : '';
    
    html += `
      <div class="product-card ${isChef ? 'chef-mode' : ''}" ${clickAttr} data-id="${product.id}" style="${!canOpen ? 'cursor:default;' : ''}">
        <div class="product-row">
          <div class="product-name-container"><span class="product-name">${escapeHtml(product.name)}</span>${editIcon}</div>
          <div class="product-stock">${stockDisplay}<span class="product-unit">${product.unit}</span></div>
        </div>
      </div>
    `;
  });
  html += '</div>';
  container.innerHTML = html;
  
  if (!isChef && !isInventoryActive) {
    const notice = document.createElement('div');
    notice.className = 'readonly-notice';
    notice.innerHTML = '<i class="bi bi-eye"></i> Режим просмотра. Инвентаризация не активна.';
    container.appendChild(notice);
  }
}

function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]; }); }

function initUnits() {
  const container = document.getElementById('unitsContainer');
  if (!container) return;
  container.innerHTML = '';
  units.forEach(unit => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'unit-btn';
    btn.textContent = unit.value;
    btn.addEventListener('click', function() {
      document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
    });
    container.appendChild(btn);
  });
}

function filterProducts() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  filteredProducts = term ? products.filter(p => p.name.toLowerCase().includes(term)) : [...products];
  renderProducts();
}

function toggleSearch() {
  const container = document.getElementById('searchContainer');
  const input = document.getElementById('searchInput');
  if (container.classList.contains('collapsed')) {
    container.classList.remove('collapsed');
    if (input) { input.style.display = 'block'; setTimeout(() => input.focus(), 100); }
  } else {
    container.classList.add('collapsed');
    if (input) { input.style.display = 'none'; input.value = ''; filterProducts(); }
  }
}

function startEditName(productId, currentName, event) {
  if (event) { event.stopPropagation(); event.preventDefault(); }
  if (!isChef) { showNotification('Только шеф-повар может редактировать названия', 'error'); return; }
  closeAllEditors();
  
  const card = document.querySelector(`.product-card[data-id="${productId}"]`);
  if (!card) return;
  
  window.currentEditingProductId = productId;
  window.isEditingName = true;
  
  const nameContainer = card.querySelector('.product-name-container');
  nameContainer.innerHTML = `
    <div style="flex:1;">
      <input type="text" class="edit-name-input" id="editNameInput_${productId}" value="${currentName.replace(/"/g, '&quot;')}" style="width:100%;padding:8px;border:2px solid #3498db;border-radius:8px;">
      <div class="edit-actions" style="margin-top:8px;display:flex;gap:8px;">
        <button class="btn btn-sm btn-success" onclick="event.stopPropagation(); saveNameEdit(${productId})">Сохранить</button>
        <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); cancelNameEdit(${productId})">Отмена</button>
      </div>
    </div>
  `;
  setTimeout(() => { const inp = document.getElementById(`editNameInput_${productId}`); if (inp) inp.focus(); }, 50);
}

async function saveNameEdit(productId) {
  const newName = document.getElementById(`editNameInput_${productId}`).value.trim();
  if (!newName) { showNotification('Название не может быть пустым', 'error'); return; }
  
  const product = products.find(p => p.id === productId);
  if (!product) return;
  
  showLoader();
  const result = await callGAS('updateProductName', { departmentName: currentDepartment, rowNumber: product.row, newName });
  hideLoader();
  
  if (result.success) {
    product.name = newName;
    filteredProducts = filteredProducts.map(p => p.id === productId ? { ...p, name: newName } : p);
    renderProducts();
    showNotification('Название обновлено', 'success');
  } else {
    showNotification(result.error || 'Ошибка', 'error');
  }
  window.isEditingName = false;
  window.currentEditingProductId = null;
}

function cancelNameEdit() {
  renderProducts();
  window.isEditingName = false;
  window.currentEditingProductId = null;
}

function closeAllEditors() {
  if (window.currentEditingProductId) { renderProducts(); window.currentEditingProductId = null; }
  window.isEditingName = false;
}

function openProductModal(productId) {
  if (window.isEditingName) return;
  if (!isChef && !isInventoryActive) { showNotification('Инвентаризация не активна', 'info'); return; }
  
  selectedProduct = filteredProducts.find(p => p.id === productId);
  if (!selectedProduct) return;
  
  document.getElementById('modalProductName').textContent = selectedProduct.name;
  document.getElementById('currentStockValue').textContent = `${selectedProduct.stock} ${selectedProduct.unit}`;
  document.getElementById('quantityInput').value = '';
  
  let unitToSelect = selectedProduct.defaultUnit || selectedProduct.unit || 'кг';
  document.querySelectorAll('.unit-btn').forEach(btn => {
    btn.classList.remove('active');
    if (btn.getAttribute('data-value') === unitToSelect) btn.classList.add('active');
  });
  
  document.getElementById('productModal').classList.add('active');
  document.body.classList.add('modal-open');
}

function closeProductModal() {
  document.getElementById('productModal').classList.remove('active');
  document.body.classList.remove('modal-open');
  selectedProduct = null;
}

async function updateProduct(isReplace) {
  const newQuantity = parseFloat(document.getElementById('quantityInput').value);
  const selectedUnitBtn = document.querySelector('.unit-btn.active');
  const newUnit = selectedUnitBtn ? selectedUnitBtn.getAttribute('data-value') : selectedProduct.unit;
  
  if (isNaN(newQuantity) || newQuantity < 0) { showNotification('Введите корректное количество', 'error'); return; }
  if (!selectedUnitBtn) { showNotification('Выберите единицу измерения', 'error'); return; }
  
  showLoader();
  const result = await callGAS('updateProductStock', {
    departmentName: currentDepartment,
    rowNumber: selectedProduct.row,
    quantity: newQuantity,
    unit: newUnit,
    isReplace: isReplace
  });
  hideLoader();
  
  if (result.success) {
    selectedProduct.stock = newQuantity;
    selectedProduct.unit = newUnit;
    renderProducts();
    showNotification(`${selectedProduct.name}: ${isReplace ? 'заменен на' : 'добавлено'} ${newQuantity} ${newUnit}`, 'success');
    closeProductModal();
  } else {
    showNotification(result.error || 'Ошибка', 'error');
  }
}

function goToStep(step) {
  document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
  document.getElementById(`step${step}`).classList.add('active');
  currentStep = step;
  const sc = document.getElementById('searchContainer');
  if (step === 3) { if (sc) sc.classList.add('visible'); document.getElementById('mainContent').scrollTop = 0; }
  else { if (sc) sc.classList.remove('visible'); }
}

function goBack() {
  if (currentStep === 3 && userData?.hasMultipleDepts) {
    document.getElementById('headerTitle').textContent = 'Выбор цеха';
    document.getElementById('backButton').style.display = 'none';
    const filtered = userData.departments.filter(d => !TECHNICAL_SHEETS.includes(d));
    renderDepartments(filtered);
    goToStep(2);
  }
}

function showLogoutModal() {
  document.getElementById('logoutModal').classList.add('active');
  document.body.classList.add('modal-open');
}

function closeLogoutModal() {
  document.getElementById('logoutModal').classList.remove('active');
  document.body.classList.remove('modal-open');
}

async function performLogout() {
  const allowOtherDevices = document.getElementById('allowOtherDevices').checked;
  showLoader();
  const result = await callGAS('logout', { deviceId: getDeviceId(), allowOtherDevices });
  hideLoader();
  
  if (result.success) {
    closeLogoutModal();
    userData = null;
    currentDepartment = null;
    products = [];
    filteredProducts = [];
    currentPhone = null;
    document.getElementById('authForm').reset();
    document.getElementById('headerTitle').textContent = 'Инвентаризация';
    const saved = localStorage.getItem('last_phone');
    if (saved) document.getElementById('phone').value = saved;
    document.getElementById('headerActions').style.display = 'none';
    goToStep(1);
    showNotification(result.message || 'Вы вышли', 'success');
  } else {
    showNotification(result.error || 'Ошибка', 'error');
  }
}

// ==================== ИНИЦИАЛИЗАЦИЯ ====================
document.addEventListener('DOMContentLoaded', function() {
  getDeviceId();
  initUnits();
  checkSession();
  
  document.getElementById('authForm').addEventListener('submit', handleAuthSubmit);
  document.getElementById('searchInput').addEventListener('input', filterProducts);
  document.getElementById('clearSearchBtn').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    filterProducts();
  });
  document.querySelector('.search-icon')?.addEventListener('click', toggleSearch);
  
  document.getElementById('productModal').addEventListener('click', function(e) {
    if (e.target === this) closeProductModal();
  });
  document.getElementById('replaceBtn').addEventListener('click', () => { if (selectedProduct) updateProduct(true); });
  document.getElementById('addBtn').addEventListener('click', () => { if (selectedProduct) updateProduct(false); });
  document.getElementById('logoutBtn').addEventListener('click', showLogoutModal);
  
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const input = document.getElementById('quantityInput');
      input.value = (parseFloat(input.value) || 0) + parseFloat(this.getAttribute('data-value'));
    });
  });
  
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { closeProductModal(); closeLogoutModal(); }
  });
  
  const savedPhone = localStorage.getItem('last_phone');
  if (savedPhone) document.getElementById('phone').value = savedPhone;
});
</script>
